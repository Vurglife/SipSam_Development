<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SipSam — Onyx Lounge mockup</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#070708;
    --bg-1:#0f0e10;
    --bg-2:#1a1819;
    --gold:#c9a14a;
    --gold-2:#e6c478;
    --gold-deep:#876221;
    --ink:#f4eedf;
    --ink-dim:#a89e88;
    --line:rgba(201,161,74,.18);
    --shadow:0 24px 60px -20px rgba(0,0,0,.7), 0 4px 12px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--bg-0);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
  body{
    background:
      radial-gradient(ellipse at top, #1a1517 0%, #070708 70%),
      var(--bg-0);
    min-height:100vh;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative}

  /* ── Top bar ── */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px 10px;
    background:linear-gradient(180deg, rgba(15,14,16,.92), rgba(15,14,16,.6) 70%, transparent);
    backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:10;
  }
  .brand{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;letter-spacing:.18em;color:var(--gold-2);text-transform:uppercase}
  .brand small{display:block;font-family:'Inter',sans-serif;font-size:9px;letter-spacing:.4em;color:var(--ink-dim);font-weight:300;margin-top:-2px}
  .wallet{display:flex;align-items:center;gap:10px}
  .wallet-amt{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--gold-2);letter-spacing:.04em}
  .wallet-amt::before{content:'$';font-size:14px;opacity:.7;margin-right:1px;vertical-align:1px}
  .wallet-icon{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--gold-2),var(--gold-deep));display:grid;place-items:center;font-size:13px;color:#1a1517;box-shadow:inset 0 1px 0 rgba(255,255,255,.35), 0 2px 6px rgba(0,0,0,.4)}

  /* ── Sub-bar (table info) ── */
  .subbar{display:flex;align-items:center;justify-content:space-between;padding:8px 18px 10px;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-dim)}
  .subbar .tier{color:var(--gold);font-weight:500}
  .subbar .hand-no{font-variant-numeric:tabular-nums}

  /* ── Table ── */
  .table-wrap{flex:1;display:grid;place-items:center;padding:8px 14px 14px;position:relative}
  .table{
    width:100%;aspect-ratio:5/7;max-height:62vh;
    border-radius:46% / 32%;
    background:
      radial-gradient(ellipse at 50% 40%, #1c1517 0%, #100a0c 65%, #07050580 100%),
      #0a0708;
    border:1px solid rgba(201,161,74,.32);
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,.03),
      inset 0 0 80px rgba(0,0,0,.6),
      0 0 0 8px #0a0708,
      0 0 0 9px rgba(201,161,74,.18),
      0 24px 60px -10px rgba(0,0,0,.7);
    position:relative;
    isolation:isolate;
    overflow:hidden;
  }
  /* faint art-deco rays */
  .table::before{
    content:'';position:absolute;inset:0;
    background:
      conic-gradient(from 0deg at 50% 50%,
        rgba(201,161,74,.045) 0 6deg, transparent 6deg 30deg,
        rgba(201,161,74,.045) 30deg 36deg, transparent 36deg 60deg,
        rgba(201,161,74,.045) 60deg 66deg, transparent 66deg 90deg,
        rgba(201,161,74,.045) 90deg 96deg, transparent 96deg 120deg,
        rgba(201,161,74,.045) 120deg 126deg, transparent 126deg 150deg,
        rgba(201,161,74,.045) 150deg 156deg, transparent 156deg 180deg,
        rgba(201,161,74,.045) 180deg 186deg, transparent 186deg 210deg,
        rgba(201,161,74,.045) 210deg 216deg, transparent 216deg 240deg,
        rgba(201,161,74,.045) 240deg 246deg, transparent 246deg 270deg,
        rgba(201,161,74,.045) 270deg 276deg, transparent 276deg 300deg,
        rgba(201,161,74,.045) 300deg 306deg, transparent 306deg 330deg,
        rgba(201,161,74,.045) 330deg 336deg, transparent 336deg 360deg);
    z-index:0;pointer-events:none;
  }
  .table-mark{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    font-family:'Cormorant Garamond',serif;font-size:64px;font-weight:600;
    color:rgba(201,161,74,.08);letter-spacing:.18em;
    z-index:1;pointer-events:none;user-select:none;
  }
  .table-mark small{display:block;font-size:11px;letter-spacing:.6em;color:rgba(201,161,74,.06);text-align:center;margin-top:4px;font-family:'Inter',sans-serif;font-weight:300}

  /* ── Pot & dealer chip ── */
  .pot{
    position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);
    z-index:3;text-align:center;
  }
  .pot-label{font-size:9px;letter-spacing:.4em;color:var(--ink-dim);text-transform:uppercase;margin-bottom:3px;font-weight:500}
  .pot-amt{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--gold-2);letter-spacing:.03em}
  .pot-amt::before{content:'$';font-size:16px;opacity:.7;vertical-align:2px;margin-right:1px}

  /* ── Seats ── */
  .seat{position:absolute;z-index:4;display:flex;flex-direction:column;align-items:center;gap:5px}
  .seat-banker{top:5%;left:50%;transform:translateX(-50%)}
  .seat-1{bottom:32%;left:6%}
  .seat-2{bottom:6%;left:24%}
  .seat-3{bottom:6%;right:24%}
  .seat-4{bottom:32%;right:6%}

  .av{
    width:48px;height:48px;border-radius:50%;
    background:linear-gradient(135deg,#2c2426,#15100f);
    border:1.5px solid var(--gold);
    display:grid;place-items:center;
    font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--gold-2);
    box-shadow:0 4px 12px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.05);
    position:relative;
  }
  .av.banker::after{
    content:'BANKER';position:absolute;top:-13px;left:50%;transform:translateX(-50%);
    font-size:8px;letter-spacing:.3em;color:var(--gold-2);font-weight:600;
    background:#0a0708;padding:1px 6px;border:1px solid var(--gold);border-radius:8px;
    text-shadow:0 0 8px rgba(201,161,74,.6);
  }
  .av.you{box-shadow:0 0 0 2px var(--gold-2), 0 0 16px rgba(230,196,120,.4), 0 4px 12px rgba(0,0,0,.5)}
  .seat-name{font-size:10px;color:var(--ink);letter-spacing:.1em;font-weight:500;text-align:center;line-height:1.2}
  .seat-chips{font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--gold);font-weight:600;letter-spacing:.02em}
  .seat-bet{
    margin-top:2px;font-size:9px;color:var(--ink-dim);letter-spacing:.15em;
    background:rgba(201,161,74,.1);padding:2px 8px;border-radius:10px;border:1px solid var(--line);
  }

  /* ── Cards ── */
  .cards{display:flex;gap:3px;margin-top:4px}
  .card{
    width:22px;height:30px;border-radius:3px;
    background:linear-gradient(135deg, #1d1416, #0d0809);
    border:1px solid rgba(201,161,74,.4);
    box-shadow:0 2px 6px rgba(0,0,0,.6), inset 0 1px 0 rgba(201,161,74,.15);
    position:relative;
  }
  .card.face{
    background:linear-gradient(180deg, #fbf6e8 0%, #e8dfc6 100%);
    border-color:#d6c89a;color:#1a0e0a;
    display:grid;place-items:center;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:11px;
  }
  .card.red{color:#a8222b}
  .card.face::before{content:attr(data-rank);font-size:10px;line-height:1}
  .card.face::after{content:attr(data-suit);font-size:8px;line-height:1}

  /* ── Action bar ── */
  .action-bar{
    padding:12px 16px calc(16px + env(safe-area-inset-bottom));
    background:linear-gradient(0deg, rgba(15,14,16,.96), rgba(15,14,16,.7) 70%, transparent);
    backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    border-top:1px solid var(--line);
    display:flex;gap:8px;
  }
  .btn{
    flex:1;height:48px;border-radius:8px;border:1px solid var(--line);
    background:linear-gradient(180deg,#1a1517,#0d0809);
    color:var(--ink);font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;
    cursor:pointer;transition:all .15s ease;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.04), 0 2px 6px rgba(0,0,0,.4);
  }
  .btn:hover{border-color:var(--gold);color:var(--gold-2)}
  .btn.primary{
    background:linear-gradient(180deg,var(--gold-2),var(--gold) 50%,var(--gold-deep));
    color:#1a0e0a;border-color:var(--gold);
    text-shadow:0 1px 0 rgba(255,255,255,.2);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.4), 0 4px 12px rgba(201,161,74,.25);
  }
  .btn.primary:hover{filter:brightness(1.08)}

  /* Floating menu */
  .menu-fab{
    position:fixed;bottom:80px;right:18px;
    width:46px;height:46px;border-radius:50%;
    background:linear-gradient(135deg,#1a1517,#0d0809);
    border:1px solid var(--gold);
    display:grid;place-items:center;color:var(--gold-2);font-size:20px;
    box-shadow:0 8px 24px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.06);
    z-index:50;cursor:pointer;
  }

  /* Caption */
  .caption{position:fixed;top:6px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:.4em;color:var(--ink-dim);text-transform:uppercase;background:#070708;padding:4px 10px;border:1px solid var(--line);border-radius:0 0 6px 6px;z-index:99}
</style>
</head>
<body>
<div class="caption">Mockup 1 · Onyx Lounge</div>
<div class="app">
  <div class="topbar">
    <div class="brand">VurgLife<small>SIPSAM</small></div>
    <div class="wallet">
      <span class="wallet-amt">12,400</span>
      <span class="wallet-icon">$</span>
    </div>
  </div>
  <div class="subbar">
    <span class="tier">VIP · $10,000 min</span>
    <span class="hand-no">Hand 14</span>
  </div>

  <div class="table-wrap">
    <div class="table">
      <div class="table-mark">VurgLife<small>SipSam</small></div>

      <div class="pot">
        <div class="pot-label">Pot</div>
        <div class="pot-amt">42,500</div>
      </div>

      <div class="seat seat-banker">
        <div class="av banker">JD</div>
        <div class="seat-name">JordanD</div>
        <div class="cards"><div class="card"></div><div class="card"></div><div class="card"></div></div>
      </div>

      <div class="seat seat-1">
        <div class="av">M</div>
        <div class="seat-name">Marcus</div>
        <div class="seat-chips">8,200</div>
        <div class="seat-bet">$2,000</div>
      </div>

      <div class="seat seat-2">
        <div class="av">L</div>
        <div class="seat-name">Lisa</div>
        <div class="seat-chips">14,750</div>
        <div class="seat-bet">$2,000</div>
      </div>

      <div class="seat seat-3">
        <div class="av you">YOU</div>
        <div class="seat-name">You</div>
        <div class="seat-chips">12,400</div>
        <div class="cards">
          <div class="card face red" data-rank="A" data-suit="♥"></div>
          <div class="card face" data-rank="K" data-suit="♠"></div>
          <div class="card face red" data-rank="Q" data-suit="♦"></div>
        </div>
      </div>

      <div class="seat seat-4">
        <div class="av">R</div>
        <div class="seat-name">Renee</div>
        <div class="seat-chips">9,800</div>
        <div class="seat-bet">$2,000</div>
      </div>
    </div>
  </div>

  <div class="menu-fab">⋯</div>

  <div class="action-bar">
    <button class="btn">Freeze Bet</button>
    <button class="btn primary">Arrange Hands</button>
    <button class="btn">Special</button>
  </div>
</div>
</body>
</html>
