<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VurgLife — Where Every Game Counts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cinzel:wght@400;600;700&family=Exo+2:ital,wght@0,300;0,400;0,600;0,800;1,400&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════
   VURGLIFE PLATFORM — COMPLETE DASHBOARD
   ═══════════════════════════════════════════════════════ */
:root {
  --bg-void:   #020609;
  --bg-deep:   #050a14;
  --bg-dark:   #080f1e;
  --bg-card:   #0b1528;
  --bg-panel:  #0f1e38;
  --bg-raised: #142040;
  --border:    #1a2d50;
  --border-hi: #243d6a;
  --blue:      #1a8cff;
  --blue-hi:   #4aabff;
  --blue-dim:  #0d4a8a;
  --gold:      #c9a84c;
  --gold-hi:   #e8c96a;
  --gold-dim:  #7a6030;
  --red:       #ef4444;
  --green:     #22c55e;
  --text-hi:   #f0f6ff;
  --text-mid:  #7a9ac0;
  --text-dim:  #334d70;
  --radius:    10px;
  --radius-lg: 18px;
  --sw:        280px;
  --nav-h:     56px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg-void);color:var(--text-hi);font-family:'Exo 2',sans-serif;overflow-x:hidden}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}

/* ── AUTH ── */
.auth-wrap{align-items:center;justify-content:center;padding:40px 20px;
  background:radial-gradient(ellipse 80% 80% at 20% 50%,rgba(10,30,70,.6),transparent 60%),
             radial-gradient(ellipse 60% 60% at 80% 20%,rgba(5,20,50,.5),transparent 60%),var(--bg-deep)}
.auth-box{width:100%;max-width:420px;background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius-lg);overflow:hidden;box-shadow:0 40px 80px rgba(0,0,0,.7);animation:su .4s ease-out}
@keyframes su{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.auth-head{background:linear-gradient(135deg,#040d1c,#0a1e3c);padding:30px;text-align:center;border-bottom:1px solid var(--border)}
.auth-logo{height:40px;filter:drop-shadow(0 0 14px rgba(26,140,255,.5));margin-bottom:10px}
.auth-brand{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;
  background:linear-gradient(135deg,#fff,var(--blue-hi));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.auth-sub{font-size:11px;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase;margin-top:2px}
.auth-body{padding:26px}
.auth-foot{padding:0 26px 22px;text-align:center;font-size:13px;color:var(--text-mid)}

/* ── FORM ── */
.fg{margin-bottom:16px}
.fl{display:block;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:2px;color:var(--text-mid);text-transform:uppercase;margin-bottom:6px}
.fi{width:100%;background:var(--bg-panel);border:1px solid var(--border);border-radius:8px;
  padding:10px 13px;color:var(--text-hi);font-family:'Exo 2',sans-serif;font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s}
.fi:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,140,255,.1)}
.fi::placeholder{color:var(--text-dim)}
.fh{font-size:11px;color:var(--text-dim);margin-top:4px}
.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:7px;
  padding:9px 13px;color:#fca5a5;font-size:13px;margin-bottom:14px;display:none}
.err.show{display:block}
.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);border-radius:7px;
  padding:9px 13px;color:#86efac;font-size:13px;margin-bottom:14px;display:none}
.ok.show{display:block}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 22px;
  border:none;border-radius:8px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;
  letter-spacing:1.5px;cursor:pointer;transition:all .18s;text-transform:uppercase;white-space:nowrap}
.bp{background:linear-gradient(135deg,#1a5aaa,var(--blue));color:#fff;box-shadow:0 4px 16px rgba(26,140,255,.25)}
.bp:hover{background:linear-gradient(135deg,#1e6cc7,#2a9dff);transform:translateY(-1px)}
.bg{background:linear-gradient(135deg,#8a6820,var(--gold));color:#0a0a00}
.bg:hover{background:linear-gradient(135deg,#a07a28,var(--gold-hi));transform:translateY(-1px)}
.bo{background:transparent;border:1px solid var(--border-hi);color:var(--blue-hi)}
.bo:hover{background:rgba(26,140,255,.08)}
.bgh{background:transparent;border:1px solid var(--border);color:var(--text-mid)}
.bgh:hover{border-color:var(--text-mid);color:var(--text-hi)}
.bfull{width:100%}
.bsm{padding:7px 14px;font-size:12px}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.al{color:var(--blue-hi);cursor:pointer;font-weight:600}
.al:hover{color:#fff;text-decoration:underline}
.div{height:1px;background:var(--border);margin:18px 0}
.sp{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* ═══════════════════════════════════════════════════════
   LANDING
   ═══════════════════════════════════════════════════════ */
#screen-landing{align-items:center;justify-content:center;flex-direction:column;
  background:radial-gradient(ellipse 80% 60% at 50% -10%,#0a2a5a,transparent 60%),var(--bg-void);position:relative;overflow:hidden}
#screen-landing::after{content:'';position:absolute;inset:0;z-index:0;
  background-image:linear-gradient(rgba(26,92,170,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(26,92,170,.05) 1px,transparent 1px);
  background-size:60px 60px;animation:gm 25s linear infinite}
@keyframes gm{to{background-position:60px 60px}}
.land-hero{position:relative;z-index:1;text-align:center;padding:60px 24px 0;max-width:820px;margin:0 auto}
.land-logo{height:72px;filter:drop-shadow(0 0 30px rgba(26,140,255,.55));animation:glow 4s ease-in-out infinite;margin-bottom:18px}
@keyframes glow{0%,100%{filter:drop-shadow(0 0 30px rgba(26,140,255,.55))}50%{filter:drop-shadow(0 0 52px rgba(26,140,255,.85))}}
.land-tag{font-family:'Rajdhani',sans-serif;font-size:12px;letter-spacing:5px;color:var(--blue-hi);margin-bottom:18px}
.land-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(56px,12vw,96px);line-height:.9;
  background:linear-gradient(135deg,#fff 0%,var(--blue-hi) 50%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.land-sub{font-size:15px;color:var(--text-mid);letter-spacing:2px;margin-bottom:40px;font-weight:300}
.land-cta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:54px}
.games-wrap{position:relative;z-index:1;width:100%;max-width:920px;margin:0 auto;padding:0 24px 60px;text-align:center}
.sec-tag{font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:4px;color:var(--text-dim);text-transform:uppercase;margin-bottom:16px}
.games-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}
.gcard{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:26px 18px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.gcard:hover:not(.soon){border-color:var(--blue-dim);transform:translateY(-3px)}
.gcard.live{border-color:var(--gold-dim)}
.gcard.live::after,.gcard.soon::after{position:absolute;top:10px;right:10px;font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;padding:3px 8px;border-radius:4px}
.gcard.live::after{content:'PLAY NOW';color:var(--gold);background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3)}
.gcard.soon::after{content:'COMING SOON';color:var(--text-dim);background:rgba(60,80,100,.3);border:1px solid rgba(60,80,100,.3)}
.gcard.soon{opacity:.45;cursor:default}
.gi{font-size:42px;margin-bottom:12px}
.gn{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;margin-bottom:4px}
.gd{font-size:12px;color:var(--text-mid);line-height:1.5}

/* ═══════════════════════════════════════════════════════
   DASHBOARD LAYOUT
   ═══════════════════════════════════════════════════════ */
#screen-dashboard{flex-direction:row;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:var(--sw);min-width:var(--sw);background:var(--bg-dark);border-right:1px solid var(--border);
  display:flex;flex-direction:column;height:100vh;overflow:hidden;z-index:40;transition:transform .3s}
.sb-head{padding:18px 18px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.sb-logo{height:26px;filter:drop-shadow(0 0 10px rgba(26,140,255,.4))}
.sb-brand{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:2px;
  background:linear-gradient(135deg,#fff,var(--blue-hi));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sb-user{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.sb-av{width:38px;height:38px;border-radius:50%;background:var(--bg-panel);border:2px solid var(--blue-dim);
  display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.sb-uname{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-bal{font-size:11px;color:var(--gold);font-weight:600}
.sb-nav{flex:1;overflow-y:auto;padding:6px 0;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.sb-nav::-webkit-scrollbar{width:3px}
.sb-nav::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.nav-sec{padding:8px 14px 3px;font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase}
.ni{display:flex;align-items:center;gap:9px;padding:9px 18px;cursor:pointer;transition:all .14s;
  border-left:3px solid transparent;font-size:13px;color:var(--text-mid)}
.ni:hover{background:rgba(26,140,255,.06);color:var(--text-hi);border-left-color:var(--blue-dim)}
.ni.active{background:rgba(26,140,255,.1);color:var(--blue-hi);border-left-color:var(--blue)}
.ni-ico{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.ni-lbl{flex:1}
.ni-bdg{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px}
.sb-foot{padding:10px 14px;border-top:1px solid var(--border);flex-shrink:0}

/* ── MAIN ── */
.dash-main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg-void)}
.topbar{height:var(--nav-h);background:rgba(8,15,30,.95);border-bottom:1px solid var(--border);
  padding:0 22px;display:flex;align-items:center;gap:14px;flex-shrink:0;backdrop-filter:blur(8px)}
.topbar-title{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:2px}
.tb-bal{display:flex;align-items:center;gap:7px;background:var(--bg-panel);border:1px solid var(--border);
  border-radius:8px;padding:5px 12px;cursor:pointer;margin-left:auto;transition:border-color .2s}
.tb-bal:hover{border-color:var(--gold-dim)}
.tb-amt{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;color:var(--gold-hi)}
.tb-lbl{font-size:10px;letter-spacing:1px;color:var(--text-dim)}
.dash-content{flex:1;overflow-y:auto;padding:24px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.dash-content::-webkit-scrollbar{width:5px}
.dash-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── PANELS ── */
.panel{display:none}
.panel.active{display:block;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(60px)}to{opacity:1;transform:translateX(0)}}
.ptitle{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;margin-bottom:3px}
.psub{font-size:13px;color:var(--text-mid);margin-bottom:22px}
.sh{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--text-hi);
  margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.sh::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}

/* ── STAT CARDS ── */
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:22px}
.sc{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.sc-lbl{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:5px}
.sc-val{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px}
.sc-val.gold{color:var(--gold-hi)} .sc-val.blue{color:var(--blue-hi)} .sc-val.green{color:var(--green)}

/* ── TABLE CARDS ── */
.tgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.tc{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;cursor:pointer;transition:all .22s;position:relative;overflow:hidden}
.tc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--blue),transparent);opacity:0;transition:opacity .3s}
.tc:hover:not(.locked){border-color:var(--blue-dim);transform:translateY(-2px)}
.tc:hover:not(.locked)::before{opacity:1}
.tc.locked{opacity:.38;cursor:not-allowed}
.tc.locked::after{content:'🔒 LOCKED';position:absolute;top:10px;right:10px;font-size:9px;font-weight:700;letter-spacing:1px;color:var(--text-dim);background:var(--bg-panel);border:1px solid var(--border);padding:3px 8px;border-radius:4px}
.tc-bet{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--gold-hi);margin-bottom:1px}
.tc-name{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:600;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:12px}
.tc-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.tc-l{color:var(--text-dim)} .tc-r{color:var(--text-mid);font-weight:600} .tc-r.gold{color:var(--gold)}

/* ── PROFILE ── */
.prof-grid{display:grid;grid-template-columns:auto 1fr;gap:22px;margin-bottom:24px;align-items:start}
.prof-av{width:90px;height:90px;border-radius:50%;background:var(--bg-panel);border:3px solid var(--blue-dim);
  display:flex;align-items:center;justify-content:center;font-size:38px;position:relative}
.av-edit{position:absolute;bottom:0;right:0;background:var(--blue);border:2px solid var(--bg-dark);border-radius:50%;
  width:24px;height:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px}
.av-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-top:8px}
.av-opt{width:42px;height:42px;border-radius:50%;border:2px solid var(--border);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:20px;transition:border-color .2s;background:var(--bg-panel)}
.av-opt:hover,.av-opt.sel{border-color:var(--blue)}

/* ── MESSAGES ── */
.msg-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:9px}
.msg-head{display:flex;justify-content:space-between;margin-bottom:7px}
.msg-from{font-weight:700;font-size:13px}
.msg-time{font-size:11px;color:var(--text-dim)}
.msg-body{font-size:13px;color:var(--text-mid);line-height:1.5}
.msg-reply{margin-top:9px;display:flex;gap:7px}
.msg-reply input{flex:1;background:var(--bg-panel);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text-hi);font-size:13px;outline:none;font-family:'Exo 2',sans-serif}
.msg-reply input:focus{border-color:var(--blue)}

/* ── BANK / HISTORY ── */
.brow{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  padding:12px 16px;display:grid;grid-template-columns:28px 1fr auto auto;gap:10px;align-items:center;margin-bottom:8px}
.brow-num{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--text-dim)}
.brow-game{font-weight:600;font-size:13px}
.brow-date{font-size:11px;color:var(--text-dim)}
.brow-chips{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px}
.brow-pl{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;padding:3px 8px;border-radius:5px}
.brow-pl.pos{background:rgba(34,197,94,.12);color:var(--green)}
.brow-pl.neg{background:rgba(239,68,68,.12);color:var(--red)}
.hist-item{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  padding:13px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.hi-badge{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.hi-badge.win{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3)}
.hi-badge.loss{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25)}

/* ── GET CHIPS ── */
.ctabs{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:18px;width:fit-content}
.ctab{padding:8px 20px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;
  cursor:pointer;transition:all .2s;color:var(--text-dim);text-transform:uppercase}
.ctab.active{background:var(--blue);color:#fff}
.ctab:hover:not(.active){background:var(--bg-raised);color:var(--text-hi)}
.pkg-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:11px}
.pkg{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px 13px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.pkg:hover{border-color:var(--gold-dim);transform:translateY(-2px)}
.pkg.pop{border-color:var(--gold-dim)}
.pkg.pop::before{content:'⭐ BEST VALUE';position:absolute;top:-1px;left:50%;transform:translateX(-50%);
  background:var(--gold);color:#000;font-size:8px;font-weight:900;letter-spacing:1px;padding:2px 10px;border-radius:0 0 6px 6px}
.pkg-chips{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gold-hi);margin-bottom:2px}
.pkg-lbl{font-size:10px;color:var(--text-dim);letter-spacing:1px;margin-bottom:9px}
.pkg-price{font-size:19px;font-weight:800;margin-bottom:12px}
.pkg-price span{font-size:12px;font-weight:400;color:var(--text-dim)}

/* ── REWARDS ── */
.rcard{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;margin-bottom:9px;display:flex;gap:14px;align-items:flex-start}
.r-ico{font-size:26px;flex-shrink:0;width:40px;text-align:center}
.r-body{flex:1}
.r-title{font-weight:700;font-size:14px;margin-bottom:2px}
.r-desc{font-size:12px;color:var(--text-mid);line-height:1.5;margin-bottom:5px}
.r-date{font-size:11px;color:var(--text-dim)}
.r-amt{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;color:var(--gold-hi);flex-shrink:0;text-align:right}
.r-claimed{font-size:10px;color:var(--green);margin-top:2px;letter-spacing:1px}
.r-pending{font-size:10px;color:var(--gold);margin-top:2px;letter-spacing:1px;cursor:pointer}
.r-pending:hover{text-decoration:underline}

/* ── FRIENDS ── */
.fcard{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  padding:13px 15px;display:flex;align-items:center;gap:11px;margin-bottom:8px}
.f-av{width:36px;height:36px;border-radius:50%;background:var(--bg-panel);border:2px solid var(--border-hi);
  display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.f-name{font-weight:700;font-size:14px}
.f-status{font-size:11px;color:var(--text-dim)}
.f-status.online{color:var(--green)}
.f-acts{display:flex;gap:5px;margin-left:auto;flex-shrink:0}

/* ── AD PANEL ── */
.adp{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;
  display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-bottom:12px}
.adp-info h3{font-weight:700;font-size:14px;margin-bottom:3px}
.adp-info p{font-size:12px;color:var(--text-mid)}
.ad-st{font-size:12px;margin-top:5px}
.ad-st.ready{color:var(--green)} .ad-st.cool{color:var(--gold)}

/* ═══════════════════════════════════════════════════════
   RULES
   ═══════════════════════════════════════════════════════ */
.rtabs{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:20px}
.rtab{padding:7px 15px;background:var(--bg-panel);border:1px solid var(--border);border-radius:6px;
  font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;color:var(--text-mid);text-transform:uppercase}
.rtab.active{background:rgba(26,140,255,.15);border-color:var(--blue);color:var(--blue-hi)}
.rtab:hover:not(.active){border-color:var(--border-hi);color:var(--text-hi)}
.rc{display:none}
.rc.active{display:block;animation:fi .2s ease}
.rsec{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:12px}
.rsec h3{font-family:'Cinzel',sans-serif;font-size:14px;font-weight:600;color:var(--gold-hi);margin-bottom:10px;

        </div>

      <!-- PROFILE -->
      <div id="panel-profile" class="panel">
        <div class="ptitle">Player Profile</div>
        <div class="psub">Manage your identity on VurgLife</div>
        <div class="prof-grid">
          <div style="position:relative">
            <div class="prof-av" id="prof-av">👤</div>
            <div class="av-edit" title="Change avatar">✏️</div>

          <button class="btn bp bsm" onclick="showPanel('getchips')">➕ Get More Chips →</button>

          <div class="gcard live" onclick="showPanel('play-blackjack')"><div class="gi">🎴</div><div class="gn">Black Jack</div><div class="gd">Beat the dealer to 21!</div></div>

        <div class="psub">Beat the Dealer — stay under 32. Select a table below.</div>
        <div class="tgrid" id="tgrid-rhum32"></div>
        <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:15px;font-size:13px;color:var(--text-mid);margin-top:4px">

        </div>
        <div class="sh" style="margin-top:20px">Table Requirements</div>

        <div class="rtabs">
          <div class="rtab active" onclick="showRules('sipsam',this)">🃏 SipSam</div>
          <div class="rtab" onclick="showRules('rhum32',this)">🥃 Rhum 32</div>

        </div>

        <!-- SIPSAM -->
        <div id="rc-sipsam" class="rc active">
          <div class="rsec"><h3>Game Overview</h3>
            <p>SipSam is a Caribbean card game played between <strong>4 players</strong> — one designated <strong>Banker</strong> and three regular players. Each player receives <strong>13 cards</strong> from a standard 52-card deck. Players compete solely against the Banker — never each other. The Banker role is <strong>randomly assigned</strong> at game start and remains fixed for that game.</p>
          </div>
          <div class="rsec"><h3>Table Selection &amp; Bank Requirements</h3>
            <table class="stbl">
              <tr><th>Table</th><th>Min Bet</th><th>Increment</th><th>Max Bet</th><th>Min Bank</th><th>Wallet</th></tr>
              <tr><td>$100 Table</td><td>$100</td><td>$50</td><td>$150</td><td>$5,000</td><td>$3,000</td></tr>
              <tr><td>$250 Table</td><td>$250</td><td>$50</td><td>$500</td><td>$15,000</td><td>$10,000</td></tr>
              <tr><td>$500 Table</td><td>$500</td><td>$100</td><td>$1,000</td><td>$30,000</td><td>$20,000</td></tr>
              <tr><td>$1,000 Table</td><td>$1,000</td><td>$500</td><td>$2,000</td><td>$60,000</td><td>$40,000</td></tr>
            </table>
            <div class="hl" style="margin-top:10px"><p>Your bank must meet the minimum to enter. Your wallet is funded from your bank on entry and returned on exit.</p></div>
          </div>
          <div class="rsec"><h3>Dealing Logic</h3>
            <p>One card is flipped face-up. Its value determines who receives the first card dealt:</p>
            <ul><li><strong>A, 5, 9, K</strong> → Banker receives first</li><li><strong>2, 6, 10</strong> → Player 1</li><li><strong>3, 7, J</strong> → Player 2</li><li><strong>4, 8, Q</strong> → Player 3</li></ul>
            <p>Cards then rotate clockwise until each player holds 13 cards.</p>
          </div>
          <div class="rsec"><h3>Hand Arrangement (3 Hands)</h3>
            <p>Each player splits 13 cards into 3 hands arranged from weakest → strongest toward themselves:</p>
            <ul>
              <li><strong>1st Hand</strong> — 3 cards — <em>weakest</em> — placed furthest from player (toward center)</li>
              <li><strong>2nd Hand</strong> — 5 cards — stronger than 1st — placed in middle</li>
              <li><strong>3rd Hand</strong> — 5 cards — <em>strongest</em> — placed closest to player</li>
            </ul>
            <div class="hl"><p>⚠️ Hands MUST be in ascending strength order: 1st (weakest) → 2nd → 3rd (strongest). Violation = disqualification.</p></div>
          </div>
          <div class="rsec"><h3>Betting</h3>
            <p>Bets are placed each round before declaring. Minimum is the table default; maximum is the table limit. Bets <strong>cannot be reduced</strong> below the table minimum.</p>
            <ul><li>$100 Table: $100 → $150 in $50 increments</li><li>$250 Table: $250 → $500 in $50 increments</li>
              <li>$500 Table: $500 → $1,000 in $100 increments</li><li>$1,000 Table: $1,000 → $2,000 in $500 increments</li></ul>
          </div>
          <div class="rsec"><h3>Hand Values (Strongest → Weakest)</h3>
            <ol><li><strong>Royal Flush</strong> — A K Q J 10 same suit</li><li><strong>Straight Flush</strong> — 5 consecutive same suit</li>
              <li><strong>Four of a Kind</strong></li><li><strong>Full House</strong> — 3-of-a-kind + pair</li>
              <li><strong>Flush</strong> — 5 same suit <em>(beats Straight in SipSam)</em></li><li><strong>Straight</strong> — 5 consecutive mixed</li>
              <li><strong>Three of a Kind</strong></li><li><strong>Two Pair</strong></li><li><strong>One Pair</strong></li><li><strong>High Card</strong></li></ol>
            <div class="hl"><p>🃏 <strong>Flush ALWAYS beats Straight</strong> in SipSam — this differs from standard poker.</p></div>
          </div>
          <div class="rsec"><h3>Tie-Breaking</h3>
            <ul><li>Banker wins all ties — <strong>except flush ties</strong></li>
              <li>Flush ties broken by suit: <strong>Hearts &gt; Spades &gt; Diamonds &gt; Clubs</strong></li>
              <li>Within same suit flush: compare cards positionally, highest card first</li></ul>
          </div>
          <div class="rsec"><h3>Payouts</h3>
            <table class="stbl">
              <tr><th>Result</th><th>Payout</th></tr>
              <tr><td>Win all 3 hands</td><td style="color:var(--green)">+2× bet (Banker pays)</td></tr>
              <tr><td>Win 2 of 3 hands</td><td style="color:var(--green)">+1× bet (Banker pays)</td></tr>
              <tr><td>Win 1 of 3 hands</td><td style="color:var(--red)">−1× bet (pay Banker)</td></tr>
              <tr><td>Lose all 3 hands</td><td style="color:var(--red)">−2× bet (pay Banker)</td></tr>
            </table>
          </div>
          <div class="rsec"><h3>Specials (Override Normal Hand Comparison)</h3>
            <p>When a Special is declared, it applies to the <strong>entire round</strong> and overrides all normal hand comparisons. A Special payout replaces the standard 1×/2× hand result — the multiplier applies to the round bet. Ranked lowest to highest payout:</p>
            <table class="stbl">
              <tr><th>Rank</th><th>Special Name</th><th>Description</th><th>Payout</th></tr>
              <tr><td><span class="rnk">#1</span>No Face</td><td>No Face</td><td>All 13 cards are non-face cards (no J, Q, K, A — numbered cards only)</td><td style="color:var(--gold-hi)">2 to 1</td></tr>
              <tr><td><span class="rnk">#2</span>Four of a Kind</td><td>Four of a Kind</td><td>Any hand among the 3 contains four cards of the same rank</td><td style="color:var(--gold-hi)">3 to 1</td></tr>
              <tr><td><span class="rnk">#2</span>Straight Flush</td><td>Straight Flush</td><td>Any hand among the 3 contains 5 consecutive cards of the same suit</td><td style="color:var(--gold-hi)">3 to 1</td></tr>
              <tr><td><span class="rnk">#3</span>Straight-Straight-Straight</td><td>Three Straights</td><td>All 3 hands are straights (5 consecutive cards, mixed suits)</td><td style="color:var(--gold-hi)">5 to 1</td></tr>
              <tr><td><span class="rnk">#3</span>Flush-Flush-Flush</td><td>Three Flushes</td><td>All 3 hands are flushes (5 cards of the same suit)</td><td style="color:var(--gold-hi)">5 to 1</td></tr>
              <tr><td><span class="rnk top">#4</span>Royal Flush</td><td>Royal Flush</td><td>Any hand contains A-K-Q-J-10 of the same suit</td><td style="color:var(--gold-hi)">7 to 1</td></tr>
              <tr><td><span class="rnk top">#5</span>6½ Pairs</td><td>Six and a Half</td><td>6 matching pairs among all 13 cards (one card left over — the "half")</td><td style="color:var(--gold-hi)">8 to 1</td></tr>

// ── API ────────────────────────────────────────────────
async function api(method, path, body) {
  const h = {'Content-Type':'application/json'};
  if (authToken) h['Authorization'] = 'Bearer ' + authToken;
  const opts = {method, headers:h, credentials:'include'};
  if (body) opts.body = JSON.stringify(body);
  try { const r = await fetch(path, opts); return r.json(); }
  catch(e) { return {error:e.message}; }
}
const apiGet  = p   => api('GET', p);
const apiPost = (p,b) => api('POST', p, b);

};

function showPanel(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-'+name)?.classList.add('active');
  document.querySelectorAll('.ni').forEach(n => {
    n.classList.toggle('active', n.getAttribute('onclick')?.includes("'"+name+"'"));

async function doRegister() {
  const btn=document.getElementById('reg-btn');
  const err=document.getElementById('reg-err'); const ok=document.getElementById('reg-ok');
  err.classList.remove('show'); ok.classList.remove('show');
  const email=document.getElementById('reg-email').value.trim();

  const pw=document.getElementById('reg-pw').value;
  btn.disabled=true; btn.innerHTML='<span class="sp"></span> Creating...';
  const res = await apiPost('/api/auth/register',{email,username:user,password:pw});
  btn.disabled=false; btn.innerHTML='♠ Create Account — Get 5,000 Free Chips';
  if (res.error) { err.textContent=res.error; err.classList.add('show'); return; }
  if (res.token) { authToken=res.token; localStorage.setItem('vurglife_token', authToken); }
  currentUser=res.user;

  setTimeout(loadDashboard,1000);
}

// ── AD ENGINE ─────────────────────────────────────────
function runAd(type, duration, title, desc) {
  adCtx={type,duration};
  if (type==='pregame') {
    document.getElementById('mo-pregame').classList.add('show');
    document.getElementById('pg-enter').disabled=true;
    document.getElementById('pg-cnt').textContent=duration;
    document.getElementById('pg-fill').style.width='0%';
  } else {
    document.getElementById('rwd-title').textContent=title;
    document.getElementById('rwd-desc').textContent=desc;
    document.getElementById('mo-reward').classList.add('show');
    document.getElementById('rwd-claim').disabled=true;
    document.getElementById('rwd-cnt').textContent=duration;
    document.getElementById('rwd-fill').style.width='0%';
  }
  clearInterval(adTimer);
  let rem=duration;
  adTimer=setInterval(()=>{
    rem--;
    const pct=((duration-rem)/duration*100)+'%';
    if (type==='pregame') {
      document.getElementById('pg-cnt').textContent=rem;
      document.getElementById('pg-fill').style.width=pct;
      if (rem<=0) { clearInterval(adTimer); document.getElementById('pg-enter').disabled=false; document.getElementById('pg-cnt').textContent='✓'; }
    } else {
      document.getElementById('rwd-cnt').textContent=rem;
      document.getElementById('rwd-fill').style.width=pct;
      if (rem<=0) { clearInterval(adTimer); document.getElementById('rwd-claim').disabled=false; document.getElementById('rwd-cnt').textContent='✓'; }
    }
  },1000);
}

function stopAd() { clearInterval(adTimer); }

function startAd(type) {
  adCtx={type};
  runAd('reward',30,'📺 Earn 500 Chips','Watch this 30-second ad to earn $500 chips.');
}

function cancelAd() { stopAd(); document.getElementById('mo-reward').classList.remove('show'); adCtx=null; }

async function claimAd() {
  stopAd(); document.getElementById('mo-reward').classList.remove('show');
  if (!adCtx) return;
  if (adCtx.type==='reward') {
    const res = await apiPost('/api/game/media/watch',{adType:'reward'});
    if (res.error) { toast('⚠️ Error',res.error); return; }
    currentUser.bankBalance=res.newBankBalance; currentUser.bank_balance=res.newBankBalance;
    refreshUI(); checkAdStatus();
    toast('🎉 Chips Earned!',`+$500 added! (${res.adsWatched}/${res.maxAds} ads today)`);
    if (!res.sessionComplete) setTimeout(()=>{ if(confirm('Watch another ad for +$500 chips?')) startAd('reward'); },800);
  } else if (adCtx.type==='milestone') {
    const res = await apiPost('/api/game/rewards/claim',{milestoneId:adCtx.mid});
    if (res.error) { toast('⚠️ Error',res.error); return; }
    currentUser.bankBalance=res.newBankBalance; currentUser.bank_balance=res.newBankBalance;
    refreshUI(); refreshRewards();
    toast('🏆 Reward Claimed!',`+$${(res.chips||0).toLocaleString()} chips!`);
  }
  adCtx=null;
}

async function checkAdStatus() {
  const res = await apiGet('/api/game/media/status');
  if (!res?.ok) return;
  const msg=res.onCooldown?`⏱ Cooldown — ${Math.ceil(res.secondsRemaining/60)}min`:'✅ Ready to watch';
  ['ad-st-home','ad-st-chips'].forEach(id=>{ const el=document.getElementById(id); if(el) el.textContent=msg; });
}

let _seenInvites = new Set();
let _invitePollTimer = null;

function startInvitePolling() {
  if (_invitePollTimer) return;
  _invitePollTimer = setInterval(pollInvites, 5000);
  pollInvites(); // first check immediately
}

function stopInvitePolling() {
  if (_invitePollTimer) { clearInterval(_invitePollTimer); _invitePollTimer = null; }
}

async function pollInvites() {
  if (!authToken && !currentUser) return;
  try {
    const res = await apiGet('/api/friends/invites');
    if (!res?.ok || !res.invites?.length) return;
    res.invites.forEach(inv => {
      if (_seenInvites.has(inv.inviteId)) return;
      _seenInvites.add(inv.inviteId);
      showInvitePopup(inv);
    });
  } catch(e) {}
}

async function acceptGameInvite(inviteId, game, tableMinBet) {
  dismissInvite(inviteId);
  try {
    const res = await apiPost('/api/friends/invite/accept', { inviteId });
    if (!res?.ok) { toast('Invite Error', res?.error || 'Could not accept invite'); return; }
    const roomId = res.roomId || null;
    const inviteConfig = res.tableConfig || null;

    // Deduct wallet from bank
    if (game === 'rhum32') {
      const tbl = inviteConfig || RHUM32_TABLES[tableMinBet] || RHUM32_TABLES[100];
      const walletAmt = tbl.wallet || tbl.walletSize || 3000;
      // Deduct bank balance
      const newBank = (currentUser.bankBalance || currentUser.bank_balance || 0) - walletAmt;
      currentUser.bankBalance = newBank; currentUser.bank_balance = newBank;
      try { await apiPost('/api/game/rhum32/enter', {tableMinBet}); } catch(e) {}

      sessionStorage.setItem('rhum32_table', JSON.stringify({...tbl, roomId, enterHandled: true}));
      sessionStorage.setItem('rhum32_user', JSON.stringify({
        id: currentUser.id || currentUser.user_id || 0,
        username: currentUser.username,
        token: authToken || ''
      }));
      window.location.href = '/rhum32';
    } else if (game === 'sipsam') {
      const tbl = inviteConfig || TABLES[tableMinBet] || TABLES[100];
      const walletAmt = tbl.wallet || tbl.walletSize || 5000;
      const newBank = (currentUser.bankBalance || currentUser.bank_balance || 0) - walletAmt;
      currentUser.bankBalance = newBank; currentUser.bank_balance = newBank;
      try { await apiPost('/api/game/enter', {tableMinBet}); } catch(e) {}

      sessionStorage.setItem('sipsam_table', JSON.stringify({...tbl, roomId, enterHandled: true}));
      sessionStorage.setItem('sipsam_user', JSON.stringify({
        id: currentUser.id || currentUser.user_id || 0,
        username: currentUser.username,
        token: authToken || ''
      }));
      window.location.href = '/sipsam';
    } else if (game === 'blackjack') {
      const tbl = inviteConfig || BJ_TABLES[tableMinBet] || BJ_TABLES[100];
      const walletAmt = tbl.wallet || tbl.walletSize || 2500;
      const newBank = (currentUser.bankBalance || currentUser.bank_balance || 0) - walletAmt;
      currentUser.bankBalance = newBank; currentUser.bank_balance = newBank;
      try { await apiPost('/api/game/bj/enter', {tableMinBet}); } catch(e) {}

      sessionStorage.setItem('bj_table', JSON.stringify({...tbl, minBet:tbl.minBet||tableMinBet, roomId, enterHandled: true, isInvitedJoiner: true}));
      // Persist tier for the BJ client's top-level BJ_TABLE init
      sessionStorage.setItem('bj_tier', JSON.stringify({
        minBet: tbl.minBet || tableMinBet,
        maxBet: tbl.maxBet,
        walletSize: tbl.wallet || tbl.walletSize,
        tieBet: tbl.tieBet || 100,
        tieBetPayout: tbl.tieBetPayout || 2000,
        blackjackPayout: tbl.blackjackPayout || null,
        label: tbl.tier || (tbl.label || 'standard').toLowerCase(),
      }));
      sessionStorage.setItem('bj_user', JSON.stringify({
        id: currentUser.id || currentUser.user_id || 0,
        username: currentUser.username,
        token: authToken || ''
      }));
      window.location.href = '/blackjack';
    } else if (game === 'holdem') {
      const tbl = inviteConfig || HOLDEM_TABLES[tableMinBet] || HOLDEM_TABLES[10];
      const walletAmt = tbl.wallet || tbl.walletSize || 1000;
      const newBank = (currentUser.bankBalance || currentUser.bank_balance || 0) - walletAmt;
      currentUser.bankBalance = newBank; currentUser.bank_balance = newBank;
      try { await apiPost('/api/game/holdem/enter', {tableMinBet}); } catch(e) {}

      sessionStorage.setItem('holdem_table', JSON.stringify({
        ...tbl,
        minBet:  tbl.minBet || tableMinBet,
        _roomId: roomId,
        roomId,
        enterHandled: true,
        isInvitedJoiner: true
      }));
      sessionStorage.setItem('holdem_user', JSON.stringify({
        id: currentUser.id || currentUser.user_id || 0,
        username: currentUser.username,
        token: authToken || '',
        avatar: currentUser.avatar_url || currentUser.avatar || '',
        bankBalance: newBank
      }));
      window.location.href = '/holdem';
    }
  } catch(e) { toast('Error', 'Failed to accept invite'); }
}
