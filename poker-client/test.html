<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Poker Join Test</title>
  <script src="https://unpkg.com/colyseus.js@0.15.27/dist/colyseus.js"></script>
  <style>
    body { font-family: Arial, sans-serif; text-align:center; padding:40px; }
    button { padding: 12px 18px; font-size:16px; cursor:pointer; }
    #status { margin-top:18px; font-size:18px; }
    #log { margin: 18px auto; max-width: 900px; text-align:left; background:#f5f5f5; padding:12px; border-radius:8px; white-space:pre-wrap; }
    .ok { color: green; }
    .bad { color: red; }
    .info { color: #0b5ed7; }
  </style>
</head>
<body>
  <h1>Phase 2.4 — Join Test</h1>
  <p>Web: <b>http://localhost:3001</b></p>
  <p>Game (Colyseus): <b>http://localhost:3002</b> (HTTP for matchmake)</p>

  <button id="joinBtn">Click to Sit at Table</button>

  <div id="status" class="info">Status: Ready…</div>
  <div id="log"></div>

  <script>
    const statusEl = document.getElementById("status");
    const logEl = document.getElementById("log");
    const joinBtn = document.getElementById("joinBtn");

    function log(msg) { logEl.textContent += msg + "\n"; }

    // IMPORTANT: use HTTP endpoint for Colyseus matchmaking
    const client = new Colyseus.Client("http://localhost:3002");

    joinBtn.onclick = async () => {
      statusEl.className = "info";
      statusEl.textContent = "Status: Joining…";
      logEl.textContent = "";

      log("Connecting to http://localhost:3002");
      try {
        const room = await client.joinOrCreate("poker_room");
        statusEl.className = "ok";
        statusEl.textContent = "Status: SUCCESS! Joined poker_room.";
        log("Joined room name: " + room.name);
        log("SessionId: " + room.sessionId);

        room.onStateChange((state) => {
          log("STATE => " + JSON.stringify(state));
        });

        log("Sending: bet 25");
        room.send("bet", { amount: 25 });

      } catch (e) {
        statusEl.className = "bad";
        statusEl.textContent = "Status: FAILED — check log";
        log("JOIN ERROR:");
        log(String(e && (e.message || e)));
        if (e && e.stack) log(e.stack);
      }
    };
  </script>
</body>
</html>
